apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-java-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: hello-java

  template:
    metadata:
      labels:
        app: hello-java

    spec:
      containers:
      - name: hello-java-container

        image: yourdockerhubusername/hello-java-app:v1

        imagePullPolicy: Always
